name: Android

on:
  push:
    branches:
      - 1.5-easy-version
    paths:
      - 'android-project/android-action.on'
  workflow_dispatch: 
#    paths-ignore:
#      - '*.md'
  pull_request:
    branches:
      - 1.5-easy-version
    types: [ opened, synchronize ]
    paths-ignore:
        - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gettext
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'adopt'
        cache: gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with: 
       gradle-version: '8.14.3'
       validate-wrappers: false
    - name: Grant execute permission for gradlew
      run: chmod +x ./android-project/gradlew
    - name: Install CMake
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.31.0"

    - name: Cache CMake build folder
      uses: actions/cache@v4
      with:
        path: android-project/app/.cxx
        key: ${{ github.workflow }}-v5-${{ github.sha }}
        restore-keys: ${{ github.workflow }}-v5-

    - name: Build
      working-directory: ${{github.workspace}}
      shell: bash
      run: cd android-project && ./gradlew assembleDebug

    - name: Upload-Package
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v4
      with:
        name: devilutionx-debug.apk
        path: android-project/app/build/outputs/apk/debug/app-debug.apk

#    - name: Clean up artifacts
#      run: rm -rf android-project/app/build/outputs
