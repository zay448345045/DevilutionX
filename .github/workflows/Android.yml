name: Android

on:
 workflow_dispatch:
    inputs:
      branch:
        description: '选择构建的分支'
        required: true
        default: 'master-easy-version-2'
#  push:
#    branches:
#      - master
#    paths-ignore:
#      - '*.md'
#      - 'docs/**'
#  pull_request:
#    types: [ opened, synchronize ]
#    paths-ignore:
#      - '*.md'
#      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gettext
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Checkout
      uses: actions/checkout@v6
      with:
      
        # 核心逻辑：直接检出用户指定的分支
        ref: ${{ github.event.inputs.branch }}
        fetch-depth: 0
        

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: gradle

    - name: Install CMake
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.31.0"

    - name: Cache CMake build folder
      uses: actions/cache@v5
      with:
        path: android-project/app/.cxx
        key: ${{ github.workflow }}-v5-${{ github.sha }}
        restore-keys: ${{ github.workflow }}-v5-

    - name: Build
      working-directory: ${{github.workspace}}
      shell: bash
      run: cd android-project && ./gradlew assembleDebug

    - name: Upload-Package
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v7
      with:
        name: devilutionx-debug.apk
        path: android-project/app/build/outputs/apk/debug/app-debug.apk
    # 关键修改：在上传前先探测文件，防止路径错误导致的上传失败
    - name: Locate and Verify APK
      run: |
        echo "Searching for APKs..."
        find android-project/app/build/outputs/apk/ -name "*.apk" -ls
        # 将 APK 移动到根目录的一个临时文件夹，方便软链接和路径识别
        mkdir -p ./release_assets
        find android-project/app/build/outputs/apk/ -name "*.apk" -exec cp {} ./release_assets/ \;

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        # 直接使用我们整理好的路径
        files: ./release_assets/*.apk
        tag_name: debug-build-${{ github.run_number }}
        name: Debug Build ${{ github.run_number }} (${{ github.event.inputs.branch }})
        draft: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Clean up artifacts
      run: rm -rf android-project/app/build/outputs
