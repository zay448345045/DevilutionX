name: Android

on:
 workflow_dispatch:

#  push:
#    branches:
#      - master-easy-version-2
#    paths-ignore:
#      - '*.md'
#      - 'docs/**'
#  pull_request:
#    types: [ opened, synchronize ]
#    paths-ignore:
#      - '*.md'
#      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install gettext
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'adopt'
        cache: gradle

    - name: Install CMake
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.31.0"

    - name: Cache CMake build folder
      uses: actions/cache@v5
      with:
        path: android-project/app/.cxx
        key: ${{ github.workflow }}-v5-${{ github.sha }}
        restore-keys: ${{ github.workflow }}-v5-
    - name: Upload to Release
      if: ${{ !env.ACT && github.event_name == 'workflow_dispatch' }}
      uses: softprops/action-gh-release@v2
      with:
        # 使用通配符匹配 build/outputs 下的所有 apk 文件
        files: android-project/app/build/outputs/apk/**/*.apk
        tag_name: debug-build-${{ github.run_number }}
        name: Debug Build ${{ github.run_number }}
        body: |
          包含构建目录下的所有 APK 文件。
          Commit: ${{ github.sha }}
        draft: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Build
      working-directory: ${{github.workspace}}
      shell: bash
      run: cd android-project && ./gradlew assembleDebug

    - name: Upload-Package
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v7
      with:
        name: devilutionx-debug.apk
        path: android-project/app/build/outputs/apk/debug/app-debug.apk

    - name: Clean up artifacts
      run: rm -rf android-project/app/build/outputs
